#
# Prereqs stage
#

# NOTE:
# This template runs an prereq jobs that need to be defined.

parameters:

# A defined list of configuration that always applies to the pipeline.
- name: policy
  type: object
  default: {}

# Defined a global configuration for the pipeline.
- name: global
  type: object
  default: {}

# Set fallback defaults for the pipeline.
- name: defaults
  type: object
  default: {}

# Defined azure configuration for the pipeline.
- name: azure
  type: object
  default: {}

# Determines if the pipeline is deploying to production.
- name: offical
  type: boolean
  default: false

# Defines the jobs which will run in the prereqs stage.
- name: prereqs
  type: jobList
  default: []

stages:

# Define a prereq stage that the pipeline must execute before all other stages
- stage: gov_prereqs
  displayName: 🔒 Prereqs
  dependsOn: []
  jobs:
  - job: gov_prereqs_devsecops
    displayName: 🔒 Prereqs - DevSecOps
    steps:
      # Checkout the repository
      - checkout: self
        fetchDepth: 0
        displayName: Checkout repository

      - ${{ if eq(coalesce(parameters.policy.diag.enabled, parameters.global.diag.enabled, parameters.defaults.diag.enabled, false), true) }}:
        - script: |
            echo "Policy -- ${POLICY_VAR_JSON}"
            echo "Global -- ${GLOBAL_VAR_JSON}"
            echo "Defaults -- ${DEFAULT_VAR_JSON}"
          displayName: 'Output pipeline configuration'
          env:
            POLICY_VAR_JSON: ${{ convertToJson(parameters.policy) }}
            GLOBAL_VAR_JSON: ${{ convertToJson(parameters.global) }}
            DEFAULTS_VAR_JSON: ${{ convertToJson(parameters.defaults) }}

      - ${{ if eq(coalesce(parameters.policy.tools.psrule.enabled, parameters.global.tools.psrule.enabled, parameters.defaults.tools.psrule.enabled, false), true) }}:
        - template: ../steps/tools.ps-rule.yaml
          parameters:
            codeAnalysisLogs: ${{ eq(coalesce(parameters.policy.prereqs.codeAnalysisLogs, parameters.global.prereqs.codeAnalysisLogs, parameters.defaults.prereqs.codeAnalysisLogs, true), true) }}

  - ${{ if ge(length(parameters.prereqs), 1) }}:
    - ${{ each job in parameters.prereqs }}:
      - ${{ job }}
