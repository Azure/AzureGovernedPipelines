#
# Prereqs stage
#

# NOTE:
# This template runs an prereq jobs that need to be defined.

parameters:

# Defined a global configuration for the pipeline.
- name: global
  type: object
  default: {}

# Set fallback defaults for the pipeline.
- name: defaults
  type: object
  default: {}

# Defined azure configuration for the pipeline.
- name: azure
  type: object
  default: {}

# Determines if the pipeline is deploying to production.
- name: offical
  type: boolean
  default: false

# Defines the jobs which will run in the prereqs stage.
- name: prereqs
  type: jobList
  default: []

stages:

# Define a prereq stage that the pipeline must execute before all other stages
- stage: gov_prereqs
  displayName: 🔒 Prereqs
  dependsOn: []
  jobs:
  - ${{ each job in parameters.prereqs }}:
    - ${{ job }}

  - ${{ if parameters.global.tools.psrule.enabled and parameters.global.tools.psrule.enabled == true }}:
    - job: gov_prereqs_psrule
      displayName: 🔒 Prereqs - PSRule
      steps:
      - template: ../steps/tools.ps-rule.yaml
