#
# Tool configuration for Defender for DevOps.
#

parameters:

- name: break
  type: boolean
  default: false

- name: codeAnalysisLogs
  type: boolean
  default: true

steps:

- task: MicrosoftSecurityDevOps@1
  displayName: 'Microsoft Security DevOps'
  inputs:
    break: ${{ parameters.break }}
